name: Capture JCOM Future Episodes

on:
  workflow_dispatch:
  schedule:
    # JST 05:00
    - cron: '0 20 * * *'

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Capture JCOM future episodes
        env:
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          GAS_WEB_APP_TOKEN: ${{ secrets.GAS_WEB_APP_TOKEN }}
        run: npm run capture:jcom-future
