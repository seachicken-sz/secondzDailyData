name: Capture TVer Engagement

on:
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture TVer engagement
        env:
          TVER_ENGAGEMENT_GAS_WEB_APP_URL: ${{ secrets.TVER_ENGAGEMENT_GAS_WEB_APP_URL }}
          GAS_WEB_APP_TOKEN: ${{ secrets.GAS_WEB_APP_TOKEN }}
        run: npm run capture:tver-engagement
